# k8s/detection-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detection-service
  template:
    metadata:
      labels:
        app: detection-service
    spec:
      containers:
        - name: detection-service
          image: smart-parking-detection:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: detection-service-svc
spec:
  selector:
    app: detection-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
